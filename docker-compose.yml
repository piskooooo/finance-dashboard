services:
  finance-dashboard:
    build: .
    image: ${IMAGE_NAME:-finance-dashboard:local}
    container_name: finance-dashboard
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATA_DIR: /app/data
      CACHE_TTL_MS: ${CACHE_TTL_MS:-900000}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      - ${DATA_PATH:-./data}:/app/data
