services:
  finance-dashboard:
    image: ${IMAGE_NAME:-ghcr.io/piskooooo/finance-dashboard:latest}
    container_name: finance-dashboard
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATA_DIR: /app/data
      CACHE_TTL_MS: ${CACHE_TTL_MS:-900000}
      PUID: ${PUID:-99}
      PGID: ${PGID:-100}
    volumes:
      - ${DATA_PATH:-./data}:/app/data
